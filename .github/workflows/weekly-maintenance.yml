name: Weekly Maintenance

on:
  schedule:
    - cron: "0 16 * * 1"
  workflow_dispatch:
  pull_request:

jobs:
  backend-smoke:
    name: Backend Smoke Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install backend dependencies
        run: npm install

      - name: Validate backend syntax
        run: node --check src/index.js

      - name: Start backend and run health check
        run: |
          node src/index.js > server.log 2>&1 &
          SERVER_PID=$!
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:3000/ > /dev/null; then
              echo "Backend health check passed"
              kill $SERVER_PID
              wait $SERVER_PID || true
              exit 0
            fi
            sleep 1
          done
          echo "Backend did not become healthy in time"
          cat server.log || true
          kill $SERVER_PID || true
          wait $SERVER_PID || true
          exit 1

  gui-builds:
    name: GUI Build Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        gui-path:
          - gui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: ${{ matrix.gui-path }}
        run: npm install

      - name: Build GUI
        working-directory: ${{ matrix.gui-path }}
        run: npm run build
