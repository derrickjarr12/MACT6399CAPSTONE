name: Deploy Readiness and Manual Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_deploy:
        description: Run SSH deploy step after readiness checks
        required: true
        type: boolean
        default: false

jobs:
  readiness:
    name: Readiness Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Backend compatibility test
        run: npm run test:compat

      - name: Build GUI
        run: npm run build:gui

      - name: Validate backend syntax
        run: node --check src/index.js

  manual-deploy:
    name: Manual SSH Deploy
    needs: readiness
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_deploy == true }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets are present
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_PATH"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --all
            git checkout main
            git pull --ff-only origin main
            npm install
            npm run build:gui
            pm2 restart mact6399capstone || pm2 start src/index.js --name mact6399capstone
