name: Deploy Readiness

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  readiness:
    name: Readiness Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install backend dependencies
        run: npm install

      - name: Backend compatibility test
        run: npm run test:compat

      - name: Install GUI dependencies
        working-directory: gui
        run: npm install

      - name: Build GUI
        run: npm run build:gui

      - name: Validate backend syntax
        run: node --check src/index.js
