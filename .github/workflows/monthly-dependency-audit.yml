name: Monthly Dependency Audit

on:
  schedule:
    - cron: "0 16 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Dependency Outdated Report
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Generate dependency report
        id: generate_report
        run: |
          mkdir -p reports
          REPORT_FILE="reports/dependency-audit-${GITHUB_RUN_ID}.md"
          {
            echo "# Monthly Dependency Audit"
            echo
            echo "Run date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo
          } > "$REPORT_FILE"

          run_outdated() {
            local path="$1"
            echo "## ${path}" >> "$REPORT_FILE"
            echo '```' >> "$REPORT_FILE"
            (cd "$path" && npm install --silent >/dev/null 2>&1 && npm outdated || true) >> "$REPORT_FILE"
            echo '```' >> "$REPORT_FILE"
            echo >> "$REPORT_FILE"
          }

          run_outdated "."
          run_outdated "gui"

          echo "report_file=$REPORT_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-report
          path: ${{ steps.generate_report.outputs.report_file }}

      - name: Create monthly issue
        uses: actions/github-script@v7
        env:
          REPORT_FILE: ${{ steps.generate_report.outputs.report_file }}
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync(process.env.REPORT_FILE, 'utf8');
            const date = new Date().toISOString().slice(0, 7);
            const title = `Monthly dependency audit ${date}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
